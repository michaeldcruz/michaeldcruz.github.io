---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <p class="meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
  {{ content }}
</article>

<p class="backlink"><a href="{{ '/' | relative_url }}">&larr; back to writing</a></p>
